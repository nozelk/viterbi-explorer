<!doctype html>
<html lang="sl" data-bs-theme="dark">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{% block title %}Viterbi Explorer{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' rx='4' fill='%23818cf8'/><text x='8' y='12' text-anchor='middle' font-size='10' font-family='monospace' font-weight='700' fill='%230a0a0c'>V</text></svg>">
</head>
<body>
<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid app-container">
        <a class="navbar-brand d-flex align-items-center gap-2" href="{{ url_for('index') }}">
            <span class="brand-logo">V</span>
            <span>Viterbi Explorer</span>
        </a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#nav">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="nav">
            <ul class="navbar-nav ms-auto gap-lg-1 align-items-lg-center">
                {% for key, label, href in NAV %}
                    <li class="nav-item">
                        <a class="nav-link {% if active == key %}is-active{% endif %}" href="{{ href }}">{{ label }}</a>
                    </li>
                {% endfor %}
                <li class="nav-item ms-lg-2">
                    <a class="nav-link" href="https://en.wikipedia.org/wiki/Viterbi_algorithm" target="_blank" rel="noopener">
                        <span style="color: var(--accent)">Wikipedia</span> <span style="color: var(--muted)">↗</span>
                    </a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="container-fluid app-container py-4 py-lg-5">
    {% block content %}{% endblock %}
</main>

<footer class="mt-5 py-4">
    <div class="container-fluid app-container d-flex justify-content-between flex-wrap gap-2">
        <span>Seminarska naloga &middot; Računalništvo 2 &middot; Skriti Markovski modeli in Viterbijev algoritem</span>
        <span class="mono-small" style="color: var(--muted)">Flask · Bootstrap 5</span>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
